<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>اتصل بنا — MediaTech Ads</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.rtl.min.css">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="../assets/style/main.css">
<style>
html, body {
  overflow-x: hidden;
  max-width: 100%;
}
*, html, body {
  cursor: auto !important;
}
a, a *, button, button *, .btn-cta, .cursor-hover {
  cursor: pointer !important;
}
input, textarea {
  cursor: text !important;
}
select {
  cursor: pointer !important;
}
</style>
</head>
<body>

<div id="header"></div>

<header class="page-header">
  <div class="container fade-in">
    <div class="section-badge"><i class="fa-solid fa-headset"></i> نحن هنا لمساعدتك</div>
    <h1 class="display-3 fw-black mb-4" style="font-weight: 900;">دعنا نبني نجاحك القادم</h1>
    <p class="lead mx-auto" >
      سواء كان لديك استفسار، مشكلة تقنية، أو ترغب في إطلاق حملتك الإعلانية، فريقنا جاهز للرد عليك في أسرع وقت.
    </p>
  </div>
</header>

<section class="py-5">
  <div class="container">
    <div class="row g-5">
      
      <div class="col-lg-5">
        <div class="row g-4">
          <div class="col-12 fade-in">
            <div class="contact-info-card cursor-hover">
              <div class="contact-icon"><i class="fa-solid fa-phone-volume"></i></div>
              <h4 class="fw-bold mb-2">اتصل بنا</h4>
              <h5 class="fw-bold text-dark" dir="ltr">01220202940</h5>
            </div>
          </div>
          
          <div class="col-12 fade-in">
            <div class="contact-info-card cursor-hover">
              <div class="contact-icon"><i class="fa-solid fa-envelope-open-text"></i></div>
              <h4 class="fw-bold mb-2">راسلنا</h4>
              <p class="text-muted fw-semibold mb-1">للاستفسارات العامة والمبيعات</p>
              <h5 class="fw-bold text-dark">aborean249@gmail.com</h5>
            </div>
          </div>

        </div>
      </div>

      <div class="col-lg-7 fade-in">
        <div class="contact-form-wrapper">
          <h2 class="fw-bold mb-4">أرسل لنا رسالة <i class="fa-solid fa-paper-plane text-primary ms-2"></i></h2>
          <form action="#" method="POST">
            <div class="row g-4">
              <div class="col-md-6">
                <label class="form-label">الاسم بالكامل</label>
                <input type="text" class="form-control cursor-hover" placeholder="أدخل اسمك" required>
              </div>
              <div class="col-md-6">
                <label class="form-label">رقم الهاتف (واتساب)</label>
                <input type="tel" class="form-control cursor-hover" placeholder="مثال: +2010..." required>
              </div>
              <div class="col-md-12">
                <label class="form-label">البريد الإلكتروني</label>
                <input type="email" class="form-control cursor-hover" placeholder="name@example.com" required>
              </div>
              <div class="col-md-12">
                <label class="form-label">نوع الخدمة المطلوبة</label>
                <select class="form-select cursor-hover">
                  <option selected disabled>اختر الخدمة...</option>
                  <option value="1">إدارة الحملات الإعلانية</option>
                  <option value="2">حل مشاكل التقييدات والعوائد</option>
                  <option value="3">شراء صفحات جاهزة للربح</option>
                  <option value="4">صناعة المحتوى البصري</option>
                  <option value="5">استفسار آخر</option>
                </select>
              </div>
              <div class="col-md-12">
                <label class="form-label">رسالتك / تفاصيل المشروع</label>
                <textarea class="form-control cursor-hover" rows="5" placeholder="اكتب تفاصيل طلبك هنا..." required></textarea>
              </div>
              <div class="col-12 mt-4">
                <button type="submit" class="btn-cta cursor-hover">
                  إرسال الطلب الآن <i class="fa-solid fa-arrow-left"></i>
                </button>
              </div>
            </div>
          </form>
        </div>
      </div>

    </div>
  </div>
</section>

<div id="footer"></div>
<script src="../assets/script/header.js"></script>
<script src="../assets/script/footer.js"></script>
<script>
const observer = new IntersectionObserver((entries) => {
  entries.forEach(e => {
    if (e.isIntersecting) {
      e.target.classList.add('visible');
    }
  });
}, { threshold: 0.1 });
document.querySelectorAll('.fade-in').forEach(el => observer.observe(el));
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
