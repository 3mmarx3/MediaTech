<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title data-ar="اتصل بنا — MediaTech Ads" data-en="Contact Us — MediaTech Ads">اتصل بنا — MediaTech Ads</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.rtl.min.css">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link rel="stylesheet" href="../assets/style/main.css">
<style>
html, body {
  overflow-x: hidden;
  max-width: 100%;
}
*, html, body {
  cursor: auto !important;
}
a, a *, button, button *, .btn-cta, .cursor-hover {
  cursor: pointer !important;
}
input, textarea {
  cursor: text !important;
}
select {
  cursor: pointer !important;
}
</style>
</head>
<body>

<div id="header"></div>

<header class="page-header">
  <div class="container fade-in">
    <div class="section-badge">
      <i class="fa-solid fa-headset"></i> 
      <span data-ar="نحن هنا لمساعدتك" data-en="We are here to help">نحن هنا لمساعدتك</span>
    </div>
    <h1 class="display-3 fw-black mb-4" style="font-weight: 900;" data-ar="دعنا نبني نجاحك القادم" data-en="Let's Build Your Next Success">دعنا نبني نجاحك القادم</h1>
    <p class="lead mx-auto" data-ar="سواء كان لديك استفسار، مشكلة تقنية، أو ترغب في إطلاق حملتك الإعلانية، فريقنا جاهز للرد عليك في أسرع وقت." data-en="Whether you have an inquiry, a technical issue, or want to launch your ad campaign, our team is ready to respond as quickly as possible.">
      سواء كان لديك استفسار، مشكلة تقنية، أو ترغب في إطلاق حملتك الإعلانية، فريقنا جاهز للرد عليك في أسرع وقت.
    </p>
  </div>
</header>

<section class="py-5">
  <div class="container">
    <div class="row g-5">
      
      <div class="col-lg-5">
        <div class="row g-4">
          <div class="col-12 fade-in">
            <div class="contact-info-card cursor-hover">
              <div class="contact-icon"><i class="fa-solid fa-phone-volume"></i></div>
              <h4 class="fw-bold mb-2" data-ar="اتصل بنا" data-en="Call Us">اتصل بنا</h4>
              <h5 class="fw-bold text-dark" dir="ltr">01220202940</h5>
            </div>
          </div>
          
          <div class="col-12 fade-in">
            <div class="contact-info-card cursor-hover">
              <div class="contact-icon"><i class="fa-solid fa-envelope-open-text"></i></div>
              <h4 class="fw-bold mb-2" data-ar="راسلنا" data-en="Email Us">راسلنا</h4>
              <p class="text-muted fw-semibold mb-1" data-ar="للاستفسارات العامة والمبيعات" data-en="For general inquiries and sales">للاستفسارات العامة والمبيعات</p>
              <h5 class="fw-bold text-dark">aborean249@gmail.com</h5>
            </div>
          </div>
        </div>
      </div>

      <div class="col-lg-7 fade-in">
        <div class="contact-form-wrapper">
          <h2 class="fw-bold mb-4">
            <span data-ar="أرسل لنا رسالة" data-en="Send us a message">أرسل لنا رسالة</span> 
            <i class="fa-solid fa-paper-plane text-primary ms-2"></i>
          </h2>
          <form action="#" method="POST">
            <div class="row g-4">
              <div class="col-md-6">
                <label class="form-label" data-ar="الاسم بالكامل" data-en="Full Name">الاسم بالكامل</label>
                <input type="text" class="form-control cursor-hover" data-ar="input" data-ar-placeholder="أدخل اسمك" data-en-placeholder="Enter your name" placeholder="أدخل اسمك" required>
              </div>
              <div class="col-md-6">
                <label class="form-label" data-ar="رقم الهاتف (واتساب)" data-en="Phone Number (WhatsApp)">رقم الهاتف (واتساب)</label>
                <input type="tel" class="form-control cursor-hover" data-ar="input" data-ar-placeholder="مثال: +2010..." data-en-placeholder="Example: +2010..." placeholder="مثال: +2010..." required>
              </div>
              <div class="col-md-12">
                <label class="form-label" data-ar="البريد الإلكتروني" data-en="Email Address">البريد الإلكتروني</label>
                <input type="email" class="form-control cursor-hover" data-ar="input" data-ar-placeholder="name@example.com" data-en-placeholder="name@example.com" placeholder="name@example.com" required>
              </div>
              <div class="col-md-12">
                <label class="form-label" data-ar="نوع الخدمة المطلوبة" data-en="Required Service Type">نوع الخدمة المطلوبة</label>
                <select class="form-select cursor-hover">
                  <option selected disabled data-ar="اختر الخدمة..." data-en="Choose service...">اختر الخدمة...</option>
                  <option value="1" data-ar="إدارة الحملات الإعلانية" data-en="Ads Management">إدارة الحملات الإعلانية</option>
                  <option value="2" data-ar="حل مشاكل التقييدات والعوائد" data-en="Payouts & Restrictions Issues">حل مشاكل التقييدات والعوائد</option>
                  <option value="3" data-ar="شراء صفحات جاهزة للربح" data-en="Buy Ready-to-Earn Pages">شراء صفحات جاهزة للربح</option>
                  <option value="4" data-ar="صناعة المحتوى البصري" data-en="Visual Content Creation">صناعة المحتوى البصري</option>
                  <option value="5" data-ar="استفسار آخر" data-en="Other Inquiry">استفسار آخر</option>
                </select>
              </div>
              <div class="col-md-12">
                <label class="form-label" data-ar="رسالتك / تفاصيل المشروع" data-en="Your Message / Project Details">رسالتك / تفاصيل المشروع</label>
                <textarea class="form-control cursor-hover" rows="5" data-ar="input" data-ar-placeholder="اكتب تفاصيل طلبك هنا..." data-en-placeholder="Write your request details here..." placeholder="اكتب تفاصيل طلبك هنا..." required></textarea>
              </div>
              <div class="col-12 mt-4">
                <button type="submit" class="btn-cta cursor-hover">
                  <span data-ar="إرسال الطلب الآن" data-en="Send Request Now">إرسال الطلب الآن</span> 
                  <i class="fa-solid fa-arrow-left"></i>
                </button>
              </div>
            </div>
          </form>
        </div>
      </div>

    </div>
  </div>
</section>

<div id="footer"></div>
<script src="../assets/script/header.js"></script>
<script src="../assets/script/footer.js"></script>
<script>
const observer = new IntersectionObserver((entries) => {
  entries.forEach(e => {
    if (e.isIntersecting) {
      e.target.classList.add('visible');
    }
  });
}, { threshold: 0.1 });
document.querySelectorAll('.fade-in').forEach(el => observer.observe(el));
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
